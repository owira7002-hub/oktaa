    <section class="area-kontak">
        <div class="container-kecil">
            <h2>Hubungi Pustakawan</h2>
            <p>Punya pertanyaan tentang peminjaman buku? Silakan kirim pesan melalui formulir di bawah.</p>

            <form class="form-pesan">
                <div class="input-grup">
                    <label>Nama Lengkap</label>
                    <input type="text" placeholder="Masukkan nama...">
                </div>
                <div class="input-grup">
                    <label>Kelas / Jurusan</label>
                    <input type="text" placeholder="Contoh: X RPL 2">
                </div>
                <div class="input-grup">
                    <label>Pesan</label>
                    <textarea rows="5" placeholder="Tuliskan pesan Anda..."></textarea>
                </div>
                <button type="button" class="tombol-kirim">Kirim Pesan</button>
            </form>

            <div class="alamat-sekolah">
                <h4>Lokasi:</h4>
                <p>Jl. mpok nori, bambu apus, Kec. cipayung, Kota Jakarta Timur.</p>
            </div>
        </div>
